# Kubernetes manifests for the Collide control plane.
# Stateless (JWT) → scales horizontally. Secrets belong in a real secret manager;
# the Secret below is a placeholder for local/dev clusters.
---
apiVersion: v1
kind: Secret
metadata:
  name: collide-control-secrets
type: Opaque
stringData:
  # Replace all of these in production (use an external secret manager / sealed-secrets).
  JWT_SECRET: "collide_shared_dev_secret_change_in_production_0123456789"
  DB_USER: "collide"
  DB_PASSWORD: "collide"
  GOOGLE_CLIENT_ID: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: collide-control-config
data:
  DATABASE_URL: "jdbc:postgresql://postgres:5432/collide"
  CORS_ALLOWED_ORIGINS: "https://app.collide.example"
  ACCESS_TTL_SECONDS: "900"
  REFRESH_TTL_SECONDS: "2592000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collide-control
  labels: { app: collide-control }
spec:
  replicas: 2
  selector:
    matchLabels: { app: collide-control }
  template:
    metadata:
      labels: { app: collide-control }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: control
          image: collide/control:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: collide-control-config }
            - secretRef: { name: collide-control-secrets }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: collide-control
spec:
  type: ClusterIP
  selector: { app: collide-control }
  ports:
    - port: 80
      targetPort: 8080
